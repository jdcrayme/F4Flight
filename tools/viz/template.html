<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F4Flight Flight Test Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#0f1117; --panel:#161922; --panel2:#1d2130; --border:#2a2f42;
  --text:#e6e8ee; --muted:#8a90a6; --dim:#5a6076;
  --pass:#4ade80; --fail:#f87171; --skip:#94a3b8; --warn:#fbbf24;
  --accent:#60a5fa; --accent2:#a78bfa;
  --alt:#4ade80; --spd:#60a5fa; --gcol:#f59e0b;
  --grid:#222637; --grid2:#2d3247;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;font-size:13px;cursor:pointer}
.hidden{display:none!important}

/* ---------- Layout ---------- */
.app{max-width:1400px;margin:0 auto;padding:16px 20px 60px}
header.app-header{padding:8px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px}
header.app-header h1{margin:0;font-size:20px;font-weight:600}
header.app-header .sub{color:var(--muted);font-size:13px;margin-top:2px}

/* ---------- Index view ---------- */
.index-summary{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.index-summary .stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 16px}
.index-summary .stat .v{font-size:20px;font-weight:600}
.index-summary .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ---------- Tier tab bar ---------- */
/* Three tabs (Low Level | High Level | End-to-End) + an "All" tab. Clicking a
   tab filters the card grid by trace.testLevel and updates the summary cards
   to reflect only that tier. */
.tier-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.tier-tabs .tab{background:transparent;border:none;color:var(--muted);padding:8px 16px;font-size:13px;
  font-weight:500;border-bottom:2px solid transparent;cursor:pointer;border-radius:4px 4px 0 0}
.tier-tabs .tab:hover{color:var(--text);background:var(--panel)}
.tier-tabs .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tier-tabs .tab .count{display:inline-block;background:var(--panel2);color:var(--muted);
  border-radius:10px;padding:1px 7px;font-size:11px;margin-left:6px}
.tier-tabs .tab.active .count{background:rgba(96,165,250,.2);color:var(--accent)}
.tier-tabs .tab .fail-pill{display:inline-block;background:rgba(248,113,113,.15);color:var(--fail);
  border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;border:1px solid rgba(248,113,113,.3)}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-bar select,.filter-bar input{background:var(--panel);border:1px solid var(--border);color:var(--text);
  border-radius:6px;padding:6px 10px;font-size:13px}
.filter-bar label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;
  transition:border-color .15s,transform .15s;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card .thumb{background:var(--bg);border-radius:6px;margin-bottom:10px;border:1px solid var(--border)}
.card .thumb svg{display:block;width:100%;height:auto}
.card .title{font-weight:600;font-size:13px;margin-bottom:2px;word-break:break-word}
.card .meta{font-size:11px;color:var(--muted)}
.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;letter-spacing:.3px}
.badge.pass{background:rgba(74,222,128,.15);color:var(--pass);border:1px solid rgba(74,222,128,.3)}
.badge.fail{background:rgba(248,113,113,.15);color:var(--fail);border:1px solid rgba(248,113,113,.3)}
.badge.skip{background:rgba(148,163,184,.15);color:var(--skip);border:1px solid rgba(148,163,184,.3)}
.badge.mixed{background:rgba(251,191,36,.15);color:var(--warn);border:1px solid rgba(251,191,36,.3)}
.empty{color:var(--muted);text-align:center;padding:60px 20px}

/* ---------- Detail view ---------- */
.detail-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.detail-header h2{margin:0;font-size:18px;font-weight:600}
.back-btn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:6px;
  padding:6px 12px}
.back-btn:hover{border-color:var(--accent)}
.detail-summary{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-bottom:16px}
.detail-summary span b{color:var(--text)}

.detail-grid{display:grid;grid-template-columns:1fr;gap:16px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px}
.panel h3{margin:0 0 10px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.panel svg{display:block;width:100%;height:auto}

/* color-by controls */
.controls{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.controls .group{display:flex;align-items:center;gap:6px}
.controls .group>span{font-size:12px;color:var(--muted)}
.controls .btn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:6px;
  padding:6px 12px;font-size:13px}
.controls .btn:hover{border-color:var(--accent)}
.controls .btn.active{background:var(--accent);color:#0f1117;border-color:var(--accent)}
.controls .btn.play{min-width:80px}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.seg button{background:var(--panel);border:none;color:var(--muted);padding:6px 10px;font-size:12px;
  border-right:1px solid var(--border)}
.seg button:last-child{border-right:none}
.seg button.active{background:var(--panel2);color:var(--text)}

/* scrubber */
.scrubber-row{display:flex;align-items:center;gap:12px;margin-top:10px}
.scrubber{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:var(--panel2);
  border-radius:3px;outline:none}
.scrubber::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
.scrubber::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);
  cursor:pointer;border:2px solid var(--bg)}
.time-label{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;color:var(--muted);
  min-width:64px;text-align:right}

/* frame readout */
.readout{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:12px}
.readout .cell{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.readout .cell .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.readout .cell .v{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:15px;font-weight:600}
.readout .cell.mode .v,.readout .cell.phase .v{font-size:12px}
.readout .cell.sample{background:rgba(96,165,250,0.06);border-color:rgba(96,165,250,0.4);
  border-left:3px solid var(--accent)}
.readout .cell.sample .l{color:var(--accent)}
.readout .cell.sample .v{font-size:13px;color:var(--text)}

/* stacked charts */
.chart-row {
  position: relative;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0;
  height: 80px;
  display: flex;
  flex-direction: column;
  cursor: ew-resize;
  overflow: hidden;
  user-select: none;
}
.chart-row.event-row {
  height: 55px;
}
.chart-row canvas {
  width: 100%;
  height: 100%;
  display: block;
}
.chart-label {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 600;
  pointer-events: none;
  background: rgba(22,25,34,0.7);
  padding: 1px 4px;
  border-radius: 3px;
}
.chart-value {
  position: absolute;
  top: 4px;
  right: 6px;
  font-family: ui-monospace, monospace;
  font-size: 11px;
  font-weight: bold;
  color: var(--text);
  pointer-events: none;
  background: rgba(22,25,34,0.7);
  padding: 1px 4px;
  border-radius: 3px;
}
.chart-cursor-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 1.5px;
  background: var(--accent);
  pointer-events: none;
  opacity: 0.85;
}
.chart-tooltip {
  position: absolute;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  color: var(--text);
  pointer-events: none;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  display: none;
  max-width: 280px;
  pointer-events: none;
}

/* 3D view */
#topdown-host svg,#threed-host svg{cursor:grab}
#threed-host svg:active{cursor:grabbing}
</style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1 id="app-title">F4Flight Flight Test Report</h1>
    <div class="sub" id="app-sub"></div>
  </header>

  <!-- Index view -->
  <section id="index-view">
    <div class="tier-tabs" id="tier-tabs">
      <button class="tab active" data-tier="all">All <span class="count" id="count-all">0</span></button>
      <button class="tab" data-tier="Low Level">Low Level <span class="count" id="count-low">0</span><span class="fail-pill hidden" id="fail-low">0</span></button>
      <button class="tab" data-tier="High Level">High Level <span class="count" id="count-high">0</span><span class="fail-pill hidden" id="fail-high">0</span></button>
      <button class="tab" data-tier="End-to-End">End-to-End <span class="count" id="count-e2e">0</span><span class="fail-pill hidden" id="fail-e2e">0</span></button>
    </div>
    <div class="index-summary" id="index-summary"></div>
    <div class="filter-bar" id="filter-bar">
      <label>Filter
        <input type="search" id="filter-input" placeholder="aircraft / scenario..." style="min-width:200px">
      </label>
      <label>Status
        <select id="filter-status">
          <option value="">all</option>
          <option value="pass">passing</option>
          <option value="fail">failing</option>
        </select>
      </label>
    </div>
    <div class="card-grid" id="card-grid"></div>
  </section>

  <!-- Detail view -->
  <section id="detail-view" class="hidden">
    <div class="detail-header">
      <button class="back-btn" id="back-btn">&larr; Index</button>
      <h2 id="detail-title"></h2>
      <span class="badge" id="detail-badge"></span>
    </div>
    <div class="detail-summary" id="detail-summary"></div>

    <!-- Test Conditionals / Checklist Panel -->
    <div class="panel" id="conditionals-panel" style="margin-bottom:16px">
      <h3 style="margin:0 0 12px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Test Conditionals Checklist</h3>
      <div id="conditionals-list" style="display:flex;gap:12px;flex-wrap:wrap"></div>
    </div>

    <div class="controls">
      <div class="group">
        <button class="btn play" id="play-btn">&#9654; Play</button>
      </div>
      <div class="group" id="focus-group">
        <span>Focus</span>
        <select id="focus-select" class="btn" style="background:var(--panel); border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:6px; cursor:pointer; font-size:13px;"></select>
      </div>
      <div class="group">
        <span>Speed</span>
        <div class="seg" id="speed-seg">
          <button data-speed="0.25">0.25&times;</button>
          <button data-speed="0.5">0.5&times;</button>
          <button data-speed="1" class="active">1&times;</button>
          <button data-speed="2">2&times;</button>
          <button data-speed="4">4&times;</button>
        </div>
      </div>
    </div>
    <div class="scrubber-row">
      <span class="time-label" id="time-now">0.0s</span>
      <input type="range" class="scrubber" id="scrubber" min="0" max="1000" value="0">
      <span class="time-label" id="time-end">0.0s</span>
    </div>
    <div class="detail-grid" style="margin-top:14px">
      <div class="panel">
        <h3 id="path-panel-title">Top-Down Flight Path</h3>
        <div id="topdown-host"></div>
        <div id="threed-host" class="hidden"></div>
        <div class="readout" id="readout"></div>
      </div>
      <div class="panel">
        <h3>Scenario Data, Samples &amp; Event Log</h3>
        <div class="data-grid" style="display:grid;grid-template-rows:1fr 1fr;gap:16px;height:500px">
          <div class="sub-panel" style="background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column">
            <h4 style="margin:0 0 10px 0;font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px">Discrete Events Log</h4>
            <div id="data-events-log" style="flex:1;overflow-y:auto;font-family:ui-monospace,monospace;font-size:12px;padding:4px"></div>
          </div>
          <div class="sub-panel" style="background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;display:flex;flex-direction:column">
            <h4 style="margin:0 0 10px 0;font-size:13px;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px">Telemetry &amp; Custom Samples Graphs</h4>
            <div id="charts-container" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding-right:4px"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
"use strict";
const REPORT_TITLE = /* INSERT_REPORT_TITLE_HERE */;
const TRACES = /* INSERT_TRACES_HERE */;

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
const state = {
  traceIdx: -1,       // -1 = index view
  t: 0,               // playhead time (seconds)
  playing: false,
  speed: 1,
  viewMode: '3d',     // '2d' or '3d'
  focusedAircraftName: 'Primary',
  zoom: 1.0,          // mouse-wheel zoom factor (1.0 = fit)
  panX: 0, panY: 0,   // pan offset in screen px
  orbit: {yaw: 0.6, pitch: 0.4, dragging: false, lastX: 0, lastY: 0},
  playTimer: null,
  filter: '',
  filterStatus: '',
  tierFilter: 'all',  // 'all' | 'Low Level' | 'High Level' | 'End-to-End'
};

const threeState = {
  initialized: false,
  scene: null,
  camera: null,
  renderer: null,
  aircraft: null,
  pathLines: [],
  waypoints: [],
  threats: {},
  tadpole: null,
  shadow: null,
  grid: null,
  span: 1.0,
};

// ---------------------------------------------------------------------------
// Stacked Interactive Charts (Timeline + Metrics)
// ---------------------------------------------------------------------------
const chartState = {
  charts: [],
  maxT: 0
};

function initCharts(tr) {
  const container = document.getElementById('charts-container');
  if (!container) return;
  container.innerHTML = '';
  chartState.charts = [];
  chartState.maxT = traceDuration(tr);

  // 1. Identify all dynamic numeric custom sample keys
  const sampleKeys = new Set();
  const sampleUnits = {};
  for (const f of tr.frames) {
    if (f.samples) {
      for (const s of f.samples) {
        if (typeof s.value === 'number') {
          const keyLower = s.key.toLowerCase();
          if (keyLower.includes('nan') ||
              keyLower.includes('captured') ||
              keyLower.includes('waypoint') ||
              keyLower.includes('check')) {
              continue;
          }
          sampleKeys.add(s.key);
          if (s.unit) sampleUnits[s.key] = s.unit;
        }
      }
    }
  }

  // 2. Define list of charts: Events, then Standard metrics, then Custom metrics
  const specs = [];

  specs.push({
    type: 'events',
    key: 'events',
    label: 'Events Track',
    color: 'var(--accent)',
    unit: ''
  });

  const colors = ['#4ade80', '#60a5fa', '#f59e0b', '#ec4899', '#a855f7', '#14b8a6'];
  let colIdx = 0;
  for (const key of sampleKeys) {
    const color = colors[colIdx % colors.length];
    colIdx++;
    specs.push({
      type: 'metric',
      key: key,
      label: key,
      color: color,
      unit: sampleUnits[key] || '',
      getValue: f => {
        if (f.samples) {
          const s = f.samples.find(x => x.key === key);
          return s ? s.value : undefined;
        }
        return undefined;
      }
    });
  }

  // 3. Create DOM elements and render each chart
  const containerWidth = container.clientWidth || 400;

  let tooltip = document.getElementById('chart-tooltip-el');
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.id = 'chart-tooltip-el';
    tooltip.className = 'chart-tooltip';
    document.body.appendChild(tooltip);
  }

  for (const spec of specs) {
    const row = document.createElement('div');
    row.className = 'chart-row' + (spec.type === 'events' ? ' event-row' : '');

    const labelSpan = document.createElement('span');
    labelSpan.className = 'chart-label';
    labelSpan.textContent = spec.label;
    row.appendChild(labelSpan);

    const valSpan = document.createElement('span');
    valSpan.className = 'chart-value';
    valSpan.textContent = '—';
    row.appendChild(valSpan);

    const canvas = document.createElement('canvas');
    row.appendChild(canvas);

    const cursorLine = document.createElement('div');
    cursorLine.className = 'chart-cursor-line';
    row.appendChild(cursorLine);

    container.appendChild(row);

    const rect = row.getBoundingClientRect();
    const w = containerWidth || rect.width || 400;
    const h = spec.type === 'events' ? 55 : 80;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    if (spec.type === 'events') {
      renderEventsTrack(ctx, w, h, tr, spec);
    } else {
      renderMetricChart(ctx, w, h, tr, spec);
    }

    const chartObj = {
      spec,
      row,
      canvas,
      ctx,
      valSpan,
      cursorLine,
      width: w,
      height: h
    };
    chartState.charts.push(chartObj);

    const handleInteract = (e) => {
      const rowRect = row.getBoundingClientRect();
      const x = Math.max(0, Math.min(rowRect.width, e.clientX - rowRect.left));
      const frac = x / rowRect.width;
      const t = frac * chartState.maxT;
      state.t = t;
      updatePlayhead();
    };

    let isDragging = false;
    row.addEventListener('mousedown', (e) => {
      isDragging = true;
      handleInteract(e);
    });
    row.addEventListener('mousemove', (e) => {
      if (isDragging) {
        handleInteract(e);
      }
      showChartTooltip(e, row, spec, tr);
    });
    row.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
    window.addEventListener('mouseup', () => {
      isDragging = false;
    });
  }

  updateChartsCursor();
}

function renderEventsTrack(ctx, w, h, tr, spec) {
  ctx.clearRect(0, 0, w, h);

  ctx.strokeStyle = '#2a2f42';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, h / 2);
  ctx.lineTo(w, h / 2);
  ctx.stroke();

  if (!tr.events || !tr.events.length) return;

  const maxT = chartState.maxT || 1;

  for (const ev of tr.events) {
    const x = (ev.t / maxT) * w;
    const y = h / 2;

    let color = '#60a5fa';
    if (ev.severity === 'fail' || ev.message.includes('FAILED')) color = '#f87171';
    else if (ev.severity === 'warn' || ev.message.includes('Condition')) color = '#fbbf24';

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#0f1117';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function renderMetricChart(ctx, w, h, tr, spec) {
  ctx.clearRect(0, 0, w, h);

  if (!tr.frames || !tr.frames.length) return;

  const maxT = chartState.maxT || 1;

  let minVal = Infinity;
  let maxVal = -Infinity;
  const pts = [];

  for (const f of tr.frames) {
    const val = spec.getValue(f);
    if (val !== null && typeof val === 'number') {
      pts.push({ t: f.t, v: val });
      if (val < minVal) minVal = val;
      if (val > maxVal) maxVal = val;
    }
  }

  if (pts.length === 0) return;

  if (minVal === maxVal) {
    minVal -= 1;
    maxVal += 1;
  } else {
    const pad = (maxVal - minVal) * 0.1;
    minVal -= pad;
    maxVal += pad;
  }

  ctx.strokeStyle = 'rgba(42, 47, 66, 0.4)';
  ctx.lineWidth = 0.5;
  const gridRows = 3;
  for (let i = 1; i < gridRows; i++) {
    const y = (i / gridRows) * h;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  const mapX = t => (t / maxT) * w;
  const mapY = v => h - 6 - ((v - minVal) / (maxVal - minVal)) * (h - 12);

  ctx.strokeStyle = spec.color;
  ctx.lineWidth = 1.75;
  ctx.beginPath();
  for (let i = 0; i < pts.length; i++) {
    const x = mapX(pts[i].t);
    const y = mapY(pts[i].v);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, spec.color + '26');
  grad.addColorStop(1, spec.color + '00');
  ctx.fillStyle = grad;
  ctx.lineTo(mapX(pts[pts.length - 1].t), h);
  ctx.lineTo(mapX(pts[0].t), h);
  ctx.closePath();
  ctx.fill();
}

function updateChartsCursor() {
  if (state.traceIdx < 0 || !chartState.maxT || !chartState.charts.length) return;
  const maxT = chartState.maxT;
  const tr = TRACES[state.traceIdx]; if (!tr) return;

  const fi = findFrameIndex(tr, state.t);
  const f = tr.frames[fi];

  for (const c of chartState.charts) {
    const xFraction = state.t / maxT;
    c.cursorLine.style.left = (xFraction * 100) + '%';

    if (c.spec.type === 'metric') {
      const val = c.spec.getValue(f);
      if (val !== null && typeof val === 'number') {
        c.valSpan.textContent = val.toFixed(c.spec.key === 'nzcgs' ? 2 : 0) + ' ' + c.spec.unit;
      } else {
        c.valSpan.textContent = '—';
      }
    } else {
      const nearby = tr.events ? tr.events.filter(e => Math.abs(e.t - state.t) < 1.5) : [];
      if (nearby.length > 0) {
        c.valSpan.textContent = nearby[0].message;
        c.valSpan.style.color = nearby[0].severity === 'fail' ? 'var(--fail)' : (nearby[0].severity === 'warn' ? 'var(--warn)' : 'var(--accent)');
      } else {
        c.valSpan.textContent = 'Swipe / Click to scrub';
        c.valSpan.style.color = 'var(--muted)';
      }
    }
  }
}

function showChartTooltip(e, row, spec, tr) {
  const tooltip = document.getElementById('chart-tooltip-el');
  if (!tooltip) return;

  const rowRect = row.getBoundingClientRect();
  const x = e.clientX - rowRect.left;
  const frac = x / rowRect.width;
  const t = frac * chartState.maxT;

  let html = `<div style="font-weight:bold;margin-bottom:2px;color:var(--accent)">Time: ${t.toFixed(1)}s</div>`;

  if (spec.type === 'events') {
    let closest = null;
    let minDist = Infinity;
    if (tr.events) {
      for (const ev of tr.events) {
        const dist = Math.abs(ev.t - t);
        if (dist < minDist) {
          minDist = dist;
          closest = ev;
        }
      }
    }
    const timeThreshold = chartState.maxT * 0.05;
    if (closest && minDist < timeThreshold) {
      const sevCol = closest.severity === 'fail' ? 'var(--fail)' : (closest.severity === 'warn' ? 'var(--warn)' : 'var(--text)');
      html += `<div style="color:${sevCol};font-weight:600;text-transform:uppercase;font-size:10px">${closest.category}</div>`;
      html += `<div style="margin-top:2px;word-break:break-word">${closest.message}</div>`;
    } else {
      tooltip.style.display = 'none';
      return;
    }
  } else {
    const fi = findFrameIndex(tr, t);
    const f = tr.frames[fi];
    const val = spec.getValue(f);
    if (val !== null && typeof val === 'number') {
      html += `<div>${spec.label}: <b style="color:${spec.color}">${val.toFixed(spec.key === 'nzcgs' ? 2 : 0)} ${spec.unit}</b></div>`;
    } else {
      tooltip.style.display = 'none';
      return;
    }
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY + 12) + 'px';
}

function updateConditionalsPanel(tr) {
  const list = document.getElementById('conditionals-list');
  if (!list) return;
  list.innerHTML = '';

  const conditions = [];

  if (tr.events) {
    for (const ev of tr.events) {
      if (ev.category === 'condition') {
        const condRegex = /Condition\s+\[(.*?)\]\s+\((.*?)\):\s+(PASSED|FAILED)/i;
        const match = ev.message.match(condRegex);
        if (match) {
          conditions.push({
            name: match[1],
            desc: match[2],
            passed: match[3].toUpperCase() === 'PASSED',
            t: ev.t
          });
        } else {
          conditions.push({
            name: ev.category,
            desc: ev.message,
            passed: !ev.message.includes('FAILED') && ev.severity !== 'fail',
            t: ev.t
          });
        }
      } else if (ev.category === 'phase') {
        const phaseRegex = /Phase\s+\[(.*?)\]\s+Finished:\s+(PASSED|FAILED(?:\s+\((.*?)\))?)/i;
        const match = ev.message.match(phaseRegex);
        if (match) {
          const isPassed = match[2].startsWith('PASSED');
          conditions.push({
            name: 'Phase: ' + match[1],
            desc: isPassed ? 'Completed successfully' : (match[3] || 'Phase failed'),
            passed: isPassed,
            t: ev.t
          });
        }
      }
    }
  }

  if (conditions.length === 0) {
    list.innerHTML = '<div style="color:var(--dim);font-style:italic">No explicit pass/fail conditions recorded for this test.</div>';
    return;
  }

  for (const cond of conditions) {
    const card = document.createElement('div');
    card.style.display = 'flex';
    card.style.alignItems = 'center';
    card.style.gap = '8px';
    card.style.padding = '8px 12px';
    card.style.borderRadius = '6px';
    card.style.border = '1px solid ' + (cond.passed ? 'rgba(74,222,128,0.3)' : 'rgba(248,113,113,0.3)');
    card.style.background = cond.passed ? 'rgba(74,222,128,0.06)' : 'rgba(248,113,113,0.06)';
    card.style.minWidth = '220px';
    card.style.flex = '1 1 220px';

    const icon = document.createElement('span');
    icon.textContent = cond.passed ? '✓' : '✗';
    icon.style.fontWeight = 'bold';
    icon.style.fontSize = '15px';
    icon.style.color = cond.passed ? 'var(--pass)' : 'var(--fail)';
    card.appendChild(icon);

    const textDiv = document.createElement('div');
    textDiv.style.display = 'flex';
    textDiv.style.flexDirection = 'column';

    const nameSpan = document.createElement('span');
    nameSpan.textContent = cond.name;
    nameSpan.style.fontWeight = 'bold';
    nameSpan.style.fontSize = '12px';
    nameSpan.style.color = 'var(--text)';
    textDiv.appendChild(nameSpan);

    const descSpan = document.createElement('span');
    descSpan.textContent = cond.desc;
    descSpan.style.fontSize = '11px';
    descSpan.style.color = 'var(--muted)';
    textDiv.appendChild(descSpan);

    card.appendChild(textDiv);

    card.style.cursor = 'pointer';
    card.addEventListener('click', () => {
      state.t = cond.t;
      updatePlayhead();
    });

    list.appendChild(card);
  }
}

// ---------------------------------------------------------------------------
// Color utilities
// ---------------------------------------------------------------------------
function hsvToRgb(h, s, v) {
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  let r, g, b;
  switch (i % 6) {
    case 0: r=v; g=t; b=p; break;
    case 1: r=q; g=v; b=p; break;
    case 2: r=p; g=v; b=t; break;
    case 3: r=p; g=q; b=v; break;
    case 4: r=t; g=p; b=v; break;
    default: r=v; g=p; b=q; break;
  }
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}
function rgbHex(r,g,b){return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');}
function hashStr(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)+s.charCodeAt(i);return Math.abs(h);}

// ---------------------------------------------------------------------------
// Trace helpers
// ---------------------------------------------------------------------------
function traceDuration(tr){return tr.duration_s||(tr.frames.length?tr.frames[tr.frames.length-1].t:0);}
function traceStatus(tr){
  if (tr.events) {
    for (const ev of tr.events) {
      if (ev.severity === 'fail' || ev.message.includes('FAILED')) return 'fail';
    }
  }
  return 'pass';
}
function tracePassedCount(tr){
  let passed = 0;
  if (tr.events) {
    for (const ev of tr.events) {
      if (ev.category === 'phase' && ev.message.includes('PASSED')) passed++;
    }
  }
  return passed;
}
function traceTotalCount(tr){
  let total = 0;
  if (tr.events) {
    for (const ev of tr.events) {
      if (ev.category === 'phase') total++;
    }
  }
  return total;
}

// Compute bounds with padding
function computeBounds(tr){
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  let minAlt=Infinity,maxAlt=-Infinity;
  for(const f of tr.frames){
    if(f.y<minX)minX=f.y; if(f.y>maxX)maxX=f.y;
    if(f.x<minY)minY=f.x; if(f.x>maxY)maxY=f.x;
    const alt=-f.z;
    if(alt<minAlt)minAlt=alt; if(alt>maxAlt)maxAlt=alt;
    if(f.threats){for(const t of f.threats){
      if(t.y<minX)minX=t.y; if(t.y>maxX)maxX=t.y;
      if(t.x<minY)minY=t.x; if(t.x>maxY)maxY=t.x;
    }}
  }
  if(tr.geometry){
    for(const g of tr.geometry){
      for(let i=0; i+2<g.coords.length; i+=3){
        const gx=g.coords[i+1], gy=g.coords[i];
        if(gx<minX)minX=gx; if(gx>maxX)maxX=gx;
        if(gy<minY)minY=gy; if(gy>maxY)maxY=gy;
      }
    }
  }
  if(!isFinite(minX)){minX=maxX=minY=maxY=0;minAlt=maxAlt=0;}
  const padX=(maxX-minX)*0.08+200, padY=(maxY-minY)*0.08+200;
  minX-=padX;maxX+=padX;minY-=padY;maxY+=padY;
  return equalizeAspect({minX,maxX,minY,maxY,minAlt,maxAlt});
}

// Equalize the X/Y aspect ratio of bounds
function equalizeAspect(b, minRatio){
  minRatio = minRatio || 0.2;
  const spanX=b.maxX-b.minX, spanY=b.maxY-b.minY;
  const spanMax=Math.max(spanX,spanY,1);
  const minSpan=spanMax*minRatio;
  if(spanX<minSpan){
    const cx=(b.minX+b.maxX)/2;
    b.minX=cx-minSpan/2; b.maxX=cx+minSpan/2;
  }
  if(spanY<minSpan){
    const cy=(b.minY+b.maxY)/2;
    b.minY=cy-minSpan/2; b.maxY=cy+minSpan/2;
  }
  return b;
}

// ---------------------------------------------------------------------------
// SVG helpers
// ---------------------------------------------------------------------------
function el(name,attrs,content){
  let s='<'+name;
  for(const k in attrs){if(attrs[k]!==undefined&&attrs[k]!==null)s+=' '+k+'="'+attrs[k]+'"';}
  if(content!==undefined){s+='>'+content+'</'+name+'>';}else{s+='/>';}
  return s;
}
function fmt(n,d){d=d===undefined?0:d;if(!isFinite(n))return'—';return n.toFixed(d);}
function fmtInt(n){if(!isFinite(n))return'—';return Math.round(n).toString();}

// ---------------------------------------------------------------------------
// Mini top-down thumbnail (for index cards)
// ---------------------------------------------------------------------------
function miniTopdown(tr){
  if(!tr.frames.length)return '<svg viewBox="0 0 200 120" width="200" height="120"></svg>';
  const b=computeBounds(tr);
  const W=200,H=120,pad=10;
  const span=Math.max(b.maxX-b.minX,b.maxY-b.minY,1);
  const scale=Math.min((W-2*pad)/span,(H-2*pad)/span);
  const ox=(W-span*scale)/2, oy=(H-span*scale)/2;
  const sx=x=>ox+(x-b.minX)*scale;
  const sy=y=>oy+(b.maxY-y)*scale;
  let scene='';

  if (tr.geometry) {
    for (const g of tr.geometry) {
      if (g.type === 'runway' && g.coords.length >= 6) {
        scene += el('line', {x1: sx(g.coords[1]), y1: sy(g.coords[0]), x2: sx(g.coords[4]), y2: sy(g.coords[3]),
          stroke: g.color || '#FFD700', 'stroke-width': 2, opacity: 0.6});
      }
    }
  }

  let pts='';
  for(let fi=0;fi<tr.frames.length;fi++){
    const f=tr.frames[fi];
    pts+=(pts?' ':'')+sx(f.y).toFixed(1)+','+sy(f.x).toFixed(1);
  }
  const paths=el('polyline',{points:pts,fill:'none',stroke:'#00ffcc','stroke-width':1.5,'stroke-linejoin':'round','stroke-linecap':'round',opacity:0.9});

  return '<svg viewBox="0 0 '+W+' '+H+'" width='+JSON.stringify(W)+' height='+JSON.stringify(H)+'>'+
    el('rect',{x:0,y:0,width:W,height:H,fill:'#0f1117'})+scene+paths+'</svg>';
}
function diamondPts(cx,cy,r){
  return cx+','+(cy-r)+' '+(cx+r)+','+cy+' '+cx+','+(cy+r)+' '+(cx-r)+','+cy;
}

function geometrySvg(tr, sx, sy, sc) {
  if (!tr.geometry || !tr.geometry.length) return '';
  let svg = '<g class="geometry">';
  for (const g of tr.geometry) {
    const col = g.color || '#3a3a4a';
    const w = g.width ? Math.max(1.5, g.width * sc * 0.1) : 1.5;
    if (g.type === 'waypoint') {
      if (g.coords.length >= 3) {
        const x = sx(g.coords[1]), y = sy(g.coords[0]);
        svg += el('polygon', {points: diamondPts(x, y, 7), fill: '#fff', stroke: col, 'stroke-width': 2});
        svg += el('text', {x: x + 10, y: y - 8, fill: '#fff', 'font-weight': 'bold', 'font-size': 11}, esc(g.name));
      }
    } else if (g.type === 'runway' || g.type === 'taxiway' || g.type === 'corridor') {
      let pts = '';
      for (let i = 0; i + 2 < g.coords.length; i += 3) {
        const x = sx(g.coords[i+1]), y = sy(g.coords[i]);
        pts += (pts ? ' ' : '') + x.toFixed(1) + ',' + y.toFixed(1);
      }
      svg += el('polyline', {points: pts, fill: 'none', stroke: col, 'stroke-width': w, 'stroke-linejoin': 'round', opacity: 0.8});
    }
  }
  return svg + '</g>';
}

function threatsSvg(tr,sx,sy,currentT){
  if(!tr.frames)return '';
  const fi=findFrameIndex(tr,currentT);
  const acFrame=tr.frames[fi];
  const style={
    missile:{color:'#f44336',label:'missile',r:5},
    lead:{color:'#ffd700',label:'lead',r:6},
    wingman:{color:'#00e5ff',label:'wingman',r:5},
    slot:{color:'#2196f3',label:'slot',r:5},
    guns:{color:'#ff9800',label:'guns',r:5},
    target:{color:'#9c27b0',label:'target',r:5},
    airbase:{color:'#ffc107',label:'airbase',r:6},
  };
  let svg='<g class="threats">';

  if(acFrame&&acFrame.threats){
    for(const th of acFrame.threats){
      const cx=sx(th.y), cy=sy(th.x);
      const st = style[th.type] || style.missile;
      if (th.type === 'lead') {
        svg += el('polygon', {points: diamondPts(cx, cy, 6), fill: st.color, stroke: '#fff', 'stroke-width': 1});
        svg += el('text', {x: cx + 10, y: cy + 4, fill: st.color, 'font-size': 10, 'font-weight': 'bold'}, esc(th.name || 'Lead'));
      } else {
        svg += el('circle', {cx: cx, cy: cy, r: st.r, fill: st.color, stroke: '#fff', 'stroke-width': 1});
        svg += el('text', {x: cx + 8, y: cy + 4, fill: st.color, 'font-size': 10}, esc(th.name || th.type));
      }
    }
  }
  return svg+'</g>';
}

// ---------------------------------------------------------------------------
// Index view
// ---------------------------------------------------------------------------
// Compute tier counts (used by the tab bar). Returns an object with one entry
// per tier: { total, fail }.
function computeTierCounts(){
  const counts = {
    'all':        {total: TRACES.length, fail: 0},
    'Low Level':  {total: 0, fail: 0},
    'High Level': {total: 0, fail: 0},
    'End-to-End': {total: 0, fail: 0},
  };
  for (const tr of TRACES) {
    const tier = tr.testLevel || '';
    const st = traceStatus(tr);
    if (counts[tier]) {
      counts[tier].total++;
      if (st === 'fail') counts[tier].fail++;
    }
    if (st === 'fail') counts['all'].fail++;
  }
  return counts;
}

function renderTierTabs(){
  const counts = computeTierCounts();
  document.getElementById('count-all').textContent = counts['all'].total;
  document.getElementById('count-low').textContent = counts['Low Level'].total;
  document.getElementById('count-high').textContent = counts['High Level'].total;
  document.getElementById('count-e2e').textContent = counts['End-to-End'].total;
  const setFail = (id, n) => {
    const el = document.getElementById(id);
    el.textContent = n;
    el.classList.toggle('hidden', n === 0);
  };
  setFail('fail-low',  counts['Low Level'].fail);
  setFail('fail-high', counts['High Level'].fail);
  setFail('fail-e2e',  counts['End-to-End'].fail);
}

function renderIndex(){
  // Update the per-tier counts in the tab bar.
  renderTierTabs();

  // Compute summary cards based on the currently-selected tier.
  let tierTraces = TRACES;
  if (state.tierFilter !== 'all') {
    tierTraces = TRACES.filter(tr => (tr.testLevel || '') === state.tierFilter);
  }
  const total = tierTraces.length;
  let passN=0, failN=0, phaseP=0, phaseT=0;
  for (const tr of tierTraces){
    const st=traceStatus(tr);
    if(st==='pass')passN++;else failN++;
    phaseP+=tracePassedCount(tr);phaseT+=traceTotalCount(tr);
  }
  const summary=document.getElementById('index-summary');
  summary.innerHTML=
    statCard(total,'Traces')+
    statCard(passN,'Passing')+
    statCard(failN,'Failing')+
    statCard(phaseP+'/'+phaseT,'Phases passed');

  const grid=document.getElementById('card-grid');
  const filt=state.filter.toLowerCase();
  const filtStatus=state.filterStatus;
  let html='';
  let shown=0;
  for(let i=0;i<TRACES.length;i++){
    const tr=TRACES[i];
    // Apply tier filter first.
    if (state.tierFilter !== 'all' && (tr.testLevel || '') !== state.tierFilter) continue;
    const st=traceStatus(tr);
    if(filtStatus&&st!==filtStatus)continue;
    if(filt){
      const hay=(tr.aircraft+' '+tr.scenario).toLowerCase();
      if(hay.indexOf(filt)<0)continue;
    }
    shown++;
    const badgeCls=st==='pass'?'pass':'fail';
    const badgeTxt=st==='pass'?'PASS':'FAIL';
    // Show the tier as a small badge under the title so it's visible which
    // tier a card belongs to even when "All" is selected.
    const tierBadge = tr.testLevel
      ? '<span class="badge skip" style="margin-right:6px">'+esc(tr.testLevel)+'</span>'
      : '';
    html+='<div class="card" data-idx="'+i+'">'+
      '<div class="thumb">'+miniTopdown(tr)+'</div>'+
      '<div class="title">'+esc(tr.aircraft)+' &mdash; '+esc(tr.scenario)+'</div>'+
      '<div class="meta">'+tierBadge+tracePassedCount(tr)+'/'+traceTotalCount(tr)+' phases &middot; '+
        fmt(traceDuration(tr),0)+'s &middot; '+tr.frames.length+' frames</div>'+
      '<div style="margin-top:6px"><span class="badge '+badgeCls+'">'+badgeTxt+'</span></div>'+
      '</div>';
  }
  if(!shown)html='<div class="empty">No traces match the filter.</div>';
  grid.innerHTML=html;
  grid.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>{location.hash='#trace/'+c.dataset.idx;});
  });
}
function statCard(v,l){return '<div class="stat"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ---------------------------------------------------------------------------
// Detail view: top-down flight path
// ---------------------------------------------------------------------------
let detailBounds=null, detailScales=null, detail3DProject=null, tsScales=null;

function renderTopDown(tr){
  const host=document.getElementById('topdown-host');
  const b=computeBounds(tr);
  detailBounds=b;
  const W=1000,padL=30,padR=20,padT=20,padB=20;
  const plotW=W-padL-padR;
  const spanX=b.maxX-b.minX, spanY=b.maxY-b.minY;
  const scBase=Math.min(plotW/spanX,plotW/spanY);
  const sc=scBase*state.zoom;
  const plotH=spanY*sc;
  const H=padT+plotH+padB;
  const ox=padL+state.panX+(plotW-spanX*sc)/2;
  const oy=padT+state.panY;
  const sx=x=>ox+(x-b.minX)*sc;
  const sy=y=>oy+(b.maxY-y)*sc;
  detailScales={sx,sy,ox,oy,padL,padT,plotW,plotH:Math.max(plotH,100),W,H};

  let svg='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">';
  const spanTD=Math.max(spanX,spanY);
  let gs=10000;
  if(spanTD<3000)gs=500;else if(spanTD<10000)gs=1000;else if(spanTD<50000)gs=5000;else gs=10000;
  svg+='<g>';
  for(let gx=Math.ceil(b.minX/gs)*gs;gx<=b.maxX;gx+=gs){
    svg+=el('line',{x1:sx(gx),y1:oy,x2:sx(gx),y2:oy+spanY*sc,class:'grid-line'});
  }
  for(let gy=Math.ceil(b.minY/gs)*gs;gy<=b.maxY;gy+=gs){
    svg+=el('line',{x1:ox,y1:sy(gy),x2:ox+spanX*sc,y2:sy(gy),class:'grid-line'});
  }
  svg+=el('rect',{x:ox,y:oy,width:spanX*sc,height:spanY*sc,fill:'none',stroke:'var(--border)','stroke-width':1});
  svg+='</g>';

  svg+=geometrySvg(tr,sx,sy,sc);

  // Draw continuous ground track line for receiver
  let pts='';
  for(let fi=0;fi<tr.frames.length;fi++){
    const f=tr.frames[fi];
    pts+=(pts?' ':'')+sx(f.y).toFixed(1)+','+sy(f.x).toFixed(1);
  }
  svg+=el('polyline',{points:pts,fill:'none',stroke:'#00ffcc','stroke-width':2.5,
    'stroke-linejoin':'round','stroke-linecap':'round',opacity:0.9});

  svg+=threatsSvg(tr,sx,sy,state.t);
  svg+='<g id="td-playhead"></g>';

  if(state.zoom!==1.0){
    svg+=el('text',{x:W-padR,y:14,fill:'var(--muted)','font-size':11,'text-anchor':'end'},
      'zoom '+state.zoom.toFixed(1)+'x');
  }

  svg+='</svg>';
  host.innerHTML=svg;
}

// ---------------------------------------------------------------------------
// Playhead update
// ---------------------------------------------------------------------------
function findFrameIndex(tr,t){
  let lo=0,hi=tr.frames.length-1,best=0;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    if(tr.frames[mid].t<=t){best=mid;lo=mid+1;}
    else hi=mid-1;
  }
  return best;
}

function dataRow(label, val, color) {
  return '<div style="display:flex;justify-content:between;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;align-items:center">' +
         '<span style="font-weight:600;color:' + color + ';font-size:12px">' + esc(label) + '</span>' +
         '<span style="font-family:ui-monospace,monospace;font-weight:bold;font-size:14px;color:var(--text);margin-left:auto">' + esc(val) + '</span>' +
         '</div>';
}

function updatePlayhead(){
  const tr=TRACES[state.traceIdx]; if(!tr||!tr.frames.length)return;
  const maxT = traceDuration(tr);
  if(state.t<0)state.t=0;
  if(state.t>maxT)state.t=maxT;
  const fi=findFrameIndex(tr,state.t);
  const f=tr.frames[fi];
  const alt = -f.z;

  if(state.viewMode==='3d'){
    render3D(tr);
  }

  const td = document.getElementById('td-playhead');
  if(td && detailScales){
    const x=detailScales.sx(f.y), y=detailScales.sy(f.x);
    const deg=90-f.psi*180/Math.PI;
    td.innerHTML=el('g',{transform:'translate('+x.toFixed(1)+','+y.toFixed(1)+') rotate('+deg.toFixed(1)+')'},
      el('polygon',{points:'0,-9 6,7 0,3 -6,7',fill:'#fff',stroke:'#000','stroke-width':1,opacity:0.95})+
      el('circle',{r:2,fill:'#000'}));
  }

  const scr=document.getElementById('scrubber');
  if(scr){
    const frac=state.t/maxT;
    scr.value=Math.round(Math.max(0,Math.min(1,frac))*1000);
  }

  document.getElementById('time-now').textContent=fmt(state.t,1)+'s';
  const te=document.getElementById('time-end');
  if(te)te.textContent=fmt(maxT,1)+'s';

  const ro=document.getElementById('readout');
  let readoutSamplesHtml='';
  if(f.samples && f.samples.length){
    for(const s of f.samples){
      const v=fmt(s.value,1)+(s.unit?' '+s.unit:'');
      readoutSamplesHtml+=cell(esc(s.key),v,'sample');
    }
  }
  ro.innerHTML=
    cell('Time',fmt(f.t,1)+'s')+
    cell('Altitude',fmtInt(alt)+' ft')+
    cell('VCAS',fmt(f.vcas,0)+' kts')+
    cell('G-load',fmt(f.nzcgs,2)+' G')+
    cell('Bank',fmt(f.phi*180/Math.PI,0)+'\u00b0')+
    cell('Pitch',fmt(f.theta*180/Math.PI,0)+'\u00b0')+
    cell('Heading',fmt(f.psi*180/Math.PI,0)+'\u00b0')+
    cell('Throttle',fmt(f.throttle,2))+
    cell('AI Mode',esc(f.mode||'—'),'mode')+
    readoutSamplesHtml;

  // Render Discrete Events Log and Custom Samples dynamic panels
  const eventsHost = document.getElementById('data-events-log');
  if (eventsHost && tr.events) {
    let eventsHtml = '';
    let closestIdx = -1, minDt = Infinity;
    for (let i = 0; i < tr.events.length; i++) {
      const ev = tr.events[i];
      const dt = Math.abs(ev.t - state.t);
      if (dt < minDt) { minDt = dt; closestIdx = i; }
    }
    for (let i = 0; i < tr.events.length; i++) {
      const ev = tr.events[i];
      const sev = ev.severity || 'info';
      const isCurrent = i === closestIdx;
      const highlightStyle = isCurrent ? 'background:rgba(96,165,250,0.15);box-shadow:inset 3px 0 0 var(--accent)' : '';
      const sevCol = sev === 'fail' ? 'var(--fail)' : (sev === 'warn' ? 'var(--warn)' : 'var(--muted)');
      eventsHtml += '<div style="display:flex;gap:12px;padding:6px 8px;border-bottom:1px solid rgba(42,47,66,0.3);align-items:baseline;' + highlightStyle + '">' +
                    '<span style="color:var(--dim);font-size:10px;min-width:45px">' + ev.t.toFixed(1) + 's</span>' +
                    '<span style="color:' + sevCol + ';font-size:10px;text-transform:uppercase;font-weight:bold;min-width:70px">' + esc(ev.category) + '</span>' +
                    '<span style="color:var(--text);flex:1">' + esc(ev.message) + '</span>' +
                    '</div>';
    }
    if (tr.events.length === 0) {
      eventsHtml = '<div style="color:var(--dim);font-style:italic;padding:40px;text-align:center">No events recorded.</div>';
    }
    eventsHost.innerHTML = eventsHtml;

    if (closestIdx >= 0 && eventsHost.children[closestIdx]) {
      const row = eventsHost.children[closestIdx];
      const cTop = eventsHost.scrollTop, cBot = cTop + eventsHost.clientHeight;
      const rTop = row.offsetTop, rBot = rTop + row.offsetHeight;
      if (rTop < cTop || rBot > cBot) {
        eventsHost.scrollTop = rTop - eventsHost.clientHeight / 2 + row.offsetHeight / 2;
      }
    }
  }

  updateChartsCursor();
}
function cell(l,v,cls){return '<div class="cell '+(cls||'')+'"><div class="l">'+l+'</div><div class="v">'+v+'</div></div>';}

function renderPathView(tr){
  const tdHost=document.getElementById('topdown-host');
  const td3Host=document.getElementById('threed-host');
  const title=document.getElementById('path-panel-title');
  if (tdHost) tdHost.classList.add('hidden');
  if (td3Host) td3Host.classList.remove('hidden');
  title.textContent='3D Flight Path (drag to orbit)';
  render3D(tr);
}

// ---------------------------------------------------------------------------
// 3D orbit view using Three.js WebGL Renderer
// ---------------------------------------------------------------------------
function createAircraftMesh(wingspan, colorHex) {
  const span = wingspan / 0.012;
  const jetGroup = new THREE.Group();

  const fuseLen = span * 0.015;
  const fuseRadius = span * 0.001;
  const fuseGeom = new THREE.CylinderGeometry(fuseRadius * 0.4, fuseRadius, fuseLen * 0.7, 16);
  fuseGeom.translate(0, -fuseLen * 0.15, 0);
  const fuseMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.4, metalness: 0.3 });
  const fuselage = new THREE.Mesh(fuseGeom, fuseMat);
  jetGroup.add(fuselage);

  const noseGeom = new THREE.ConeGeometry(fuseRadius * 0.4, fuseLen * 0.3, 16);
  noseGeom.translate(0, fuseLen * 0.35, 0);
  const noseMat = new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.5 });
  const nose = new THREE.Mesh(noseGeom, noseMat);
  jetGroup.add(nose);

  const canopyGeom = new THREE.SphereGeometry(fuseRadius * 0.5, 16, 16);
  canopyGeom.scale(1, 2.2, 1.2);
  canopyGeom.translate(0, fuseLen * 0.1, fuseRadius * 0.6);
  const canopyMat = new THREE.MeshStandardMaterial({
    color: 0x38bdf8,
    transparent: true,
    opacity: 0.65,
    roughness: 0.1,
    metalness: 0.9
  });
  const canopy = new THREE.Mesh(canopyGeom, canopyMat);
  jetGroup.add(canopy);

  const wingGeom = new THREE.BufferGeometry();
  const wHalf = span * 0.006;
  const wChord = span * 0.004;
  const wSweep = span * 0.003;
  const wingVertices = new Float32Array([
    0, 0, 0,
    wHalf, -wSweep, 0,
    wHalf, -(wSweep + wChord * 0.4), 0,
    0, -wChord, 0,
    -wHalf, -(wSweep + wChord * 0.4), 0,
    -wHalf, -wSweep, 0
  ]);
  const wingIndices = [
    0, 1, 3,
    1, 2, 3,
    0, 3, 5,
    5, 3, 4
  ];
  wingGeom.setAttribute('position', new THREE.BufferAttribute(wingVertices, 3));
  wingGeom.setIndex(wingIndices);
  wingGeom.computeVertexNormals();
  const wingMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.4, side: THREE.DoubleSide });
  const wings = new THREE.Mesh(wingGeom, wingMat);
  wings.position.set(0, fuseLen * 0.05, -fuseRadius * 0.1);
  jetGroup.add(wings);

  const tailGeom = new THREE.BufferGeometry();
  const tHeight = span * 0.0035;
  const tChord = span * 0.0025;
  const tSweep = span * 0.0015;
  const tailVertices = new Float32Array([
    0, -fuseLen * 0.35, fuseRadius * 0.3,
    0, -fuseLen * 0.45 - tSweep, fuseRadius * 0.3 + tHeight,
    0, -fuseLen * 0.45 - tSweep - tChord * 0.3, fuseRadius * 0.3 + tHeight,
    0, -fuseLen * 0.45 - tChord, fuseRadius * 0.3
  ]);
  const tailIndices = [
    0, 1, 3,
    1, 2, 3
  ];
  tailGeom.setAttribute('position', new THREE.BufferAttribute(tailVertices, 3));
  tailGeom.setIndex(tailIndices);
  tailGeom.computeVertexNormals();
  const tail = new THREE.Mesh(tailGeom, wingMat);
  jetGroup.add(tail);

  return jetGroup;
}

function initThreeJS(tr) {
  const host = document.getElementById('threed-host');
  host.innerHTML = '';

  const width = host.clientWidth || 1000;
  const height = 620;
  host.style.height = height + 'px';
  host.style.position = 'relative';

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0c12);

  const camera = new THREE.PerspectiveCamera(45, width / height, 1, 10000000);
  camera.up.set(0, 0, 1); // Z-axis is UP
  scene.add(camera);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(width, height);
  host.appendChild(renderer.domElement);

  const overlay = document.createElement('div');
  overlay.id = 'labels-overlay';
  overlay.style.position = 'absolute';
  overlay.style.top = '0';
  overlay.style.left = '0';
  overlay.style.width = '100%';
  overlay.style.height = '100%';
  overlay.style.pointerEvents = 'none';
  overlay.style.overflow = 'hidden';
  overlay.style.zIndex = '10';
  host.appendChild(overlay);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
  dirLight.position.set(0, 0, 1);
  camera.add(dirLight);

  const b = computeBounds(tr);
  const span = Math.max(b.maxX-b.minX, b.maxY-b.minY, b.maxAlt-b.minAlt, 1);

  const gridHelper = new THREE.GridHelper(span * 2, 50, 0x5a6275, 0x222637);
  gridHelper.rotation.x = Math.PI / 2;
  const centerX = (b.minX + b.maxX) / 2;
  const centerY = (b.minY + b.maxY) / 2;
  gridHelper.position.set(centerX, centerY, 0);
  scene.add(gridHelper);

  const jetGroup = createAircraftMesh(32.8, 0x94a3b8);
  scene.add(jetGroup);

  // Render continuous 3D Ribbon Trail for the main aircraft
  const pathLines = [];
  const positions = [];
  const colors = [];
  const indices = [];
  let k = 0;

  for (let fi = 0; fi < tr.frames.length; fi++) {
    const f = tr.frames[fi];
    const p = new THREE.Vector3(f.y, f.x, -f.z);
    const theta = f.theta || 0;
    const phi = f.phi || 0;
    const psi = f.psi || 0;
    const euler = new THREE.Euler(theta, phi, -psi, 'ZXY');
    const wingDir = new THREE.Vector3(1, 0, 0).applyEuler(euler);
    const wing_half_width = 16.4; // 16.4 ft half-wingspan (total 32.8 ft wingspan)

    const v_left = p.clone().addScaledVector(wingDir, -wing_half_width);
    const v_right = p.clone().addScaledVector(wingDir, wing_half_width);

    positions.push(v_left.x, v_left.y, v_left.z);
    positions.push(v_right.x, v_right.y, v_right.z);

    const colHex = '#00ffcc';
    const colorObj = new THREE.Color(colHex);
    colors.push(colorObj.r, colorObj.g, colorObj.b);
    colors.push(colorObj.r, colorObj.g, colorObj.b);

    if (fi < tr.frames.length - 1) {
      indices.push(2*k, 2*k+1, 2*k+2);
      indices.push(2*k+1, 2*k+3, 2*k+2);
    }
    k++;
  }

  if (positions.length >= 6) {
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geom.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    geom.setIndex(indices);
    geom.computeVertexNormals();

    const mat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      side: THREE.DoubleSide,
      roughness: 0.5,
      metalness: 0.1,
      transparent: true,
      opacity: 0.8
    });
    const ribbon = new THREE.Mesh(geom, mat);
    scene.add(ribbon);
    pathLines.push(ribbon);
  }

  // Extract other moving tracks for drawing their trails
  const trackTrails = {};
  for (let fi = 0; fi < tr.frames.length; fi++) {
    const f = tr.frames[fi];
    if (f.threats) {
      for (const th of f.threats) {
        if (!th.name) continue;
        if (!trackTrails[th.name]) {
          trackTrails[th.name] = {
            positions: [],
            colors: [],
            indices: [],
            k: 0,
            colorHex: (th.type === 'lead') ? '#ffd700' : '#ff4444'
          };
        }
        const tTr = trackTrails[th.name];
        const p = new THREE.Vector3(th.y, th.x, -th.z);
        const theta = th.theta || 0;
        const phi = th.phi || 0;
        const psi = th.psi || 0;
        const euler = new THREE.Euler(theta, phi, -psi, 'ZXY');
        const wingDir = new THREE.Vector3(1, 0, 0).applyEuler(euler);
        const wing_half_width = 16.4; // 16.4 ft half-wingspan (total 32.8 ft wingspan)

        const v_left = p.clone().addScaledVector(wingDir, -wing_half_width);
        const v_right = p.clone().addScaledVector(wingDir, wing_half_width);

        tTr.positions.push(v_left.x, v_left.y, v_left.z);
        tTr.positions.push(v_right.x, v_right.y, v_right.z);

        const colorObj = new THREE.Color(tTr.colorHex);
        tTr.colors.push(colorObj.r, colorObj.g, colorObj.b);
        tTr.colors.push(colorObj.r, colorObj.g, colorObj.b);

        if (tTr.k > 0) {
          tTr.indices.push(2*(tTr.k-1), 2*(tTr.k-1)+1, 2*tTr.k);
          tTr.indices.push(2*(tTr.k-1)+1, 2*tTr.k+1, 2*tTr.k);
        }
        tTr.k++;
      }
    }
  }

  for (const name in trackTrails) {
    const tTr = trackTrails[name];
    if (tTr.positions.length >= 6) {
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.Float32BufferAttribute(tTr.positions, 3));
      geom.setAttribute('color', new THREE.Float32BufferAttribute(tTr.colors, 3));
      geom.setIndex(tTr.indices);
      geom.computeVertexNormals();

      const mat = new THREE.MeshStandardMaterial({
        vertexColors: true,
        side: THREE.DoubleSide,
        roughness: 0.5,
        metalness: 0.1,
        transparent: true,
        opacity: 0.65
      });
      const ribbon = new THREE.Mesh(geom, mat);
      scene.add(ribbon);
      pathLines.push(ribbon);
    }
  }

  // Render Generalized Trace Geometry in 3D
  if (tr.geometry) {
    for (const g of tr.geometry) {
      const colHex = g.color || '#ffffff';
      const colVal = parseInt(colHex.replace('#', '0x'));
      const widthVal = g.width || 10.0;

      if (g.type === 'waypoint') {
        const wpGeom = new THREE.ConeGeometry(24.6, 49.2, 4);
        wpGeom.rotateX(Math.PI / 2);
        const wpMat = new THREE.MeshStandardMaterial({ color: colVal, roughness: 0.4 });
        const wx = g.coords[1], wy = g.coords[0], wz = -g.coords[2];
        const wpMesh = new THREE.Mesh(wpGeom, wpMat);
        wpMesh.position.set(wx, wy, wz);
        scene.add(wpMesh);

        const tpPoints = [new THREE.Vector3(wx, wy, wz), new THREE.Vector3(wx, wy, 0)];
        const tpGeom = new THREE.BufferGeometry().setFromPoints(tpPoints);
        const tpMat = new THREE.LineDashedMaterial({ color: colVal, dashSize: span * 0.015, gapSize: span * 0.015, opacity: 0.35, transparent: true });
        const tpLine = new THREE.Line(tpGeom, tpMat);
        tpLine.computeLineDistances();
        scene.add(tpLine);

        const gRingGeom = new THREE.RingGeometry(span * 0.003, span * 0.004, 16);
        const gRingMat = new THREE.MeshBasicMaterial({ color: 0xffd700, side: THREE.DoubleSide, opacity: 0.5, transparent: true });
        const gRing = new THREE.Mesh(gRingGeom, gRingMat);
        gRing.position.set(wx, wy, 0.05);
        scene.add(gRing);
      } else if (g.type === 'runway') {
        if (g.coords.length >= 6) {
          const x1 = g.coords[1], y1 = g.coords[0], z1 = -g.coords[2];
          const x2 = g.coords[4], y2 = g.coords[3], z2 = -g.coords[5];
          const dx = x2 - x1, dy = y2 - y1;
          const len = Math.sqrt(dx*dx + dy*dy) || 1;
          const cx = (x1 + x2)/2, cy = (y1 + y2)/2, cz = (z1 + z2)/2;
          const angle = Math.atan2(dy, dx);

          const runwayGeom = new THREE.PlaneGeometry(widthVal || 150, len);
          const runwayMat = new THREE.MeshStandardMaterial({ color: 0x1b202e, roughness: 0.9, side: THREE.DoubleSide });
          const runway = new THREE.Mesh(runwayGeom, runwayMat);
          runway.position.set(cx, cy, cz + 0.04);
          runway.rotation.z = angle - Math.PI / 2;
          scene.add(runway);

          const clPoints = [new THREE.Vector3(x1, y1, z1 + 0.08), new THREE.Vector3(x2, y2, z2 + 0.08)];
          const clGeom = new THREE.BufferGeometry().setFromPoints(clPoints);
          const clMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: span * 0.015, gapSize: span * 0.01 });
          const cl = new THREE.Line(clGeom, clMat);
          cl.computeLineDistances();
          scene.add(cl);
        }
      } else if (g.type === 'taxiway' || g.type === 'corridor') {
        const points = [];
        for (let i = 0; i + 2 < g.coords.length; i += 3) {
          points.push(new THREE.Vector3(g.coords[i+1], g.coords[i], -g.coords[i+2] + 0.06));
        }
        if (points.length >= 2) {
          const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
          const lineMat = new THREE.LineBasicMaterial({ color: colVal, linewidth: 3 });
          const line = new THREE.Line(lineGeom, lineMat);
          scene.add(line);
        }
      }
    }
  }

  // Playhead shadow
  const shadowGeom = new THREE.RingGeometry(span*0.005, span*0.0065, 24);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, side: THREE.DoubleSide, opacity: 0.55, transparent: true });
  const shadow = new THREE.Mesh(shadowGeom, shadowMat);
  shadow.position.set(0, 0, 0.05);
  scene.add(shadow);

  // Playhead vertical altitude tadpole line
  const tadpolePoints = [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)];
  const tadpoleGeom = new THREE.BufferGeometry().setFromPoints(tadpolePoints);
  const tadpoleMat = new THREE.LineDashedMaterial({ color: 0x38bdf8, dashSize: span*0.015, gapSize: span*0.01 });
  const tadpole = new THREE.Line(tadpoleGeom, tadpoleMat);
  scene.add(tadpole);

  threeState.initialized = true;
  threeState.scene = scene;
  threeState.camera = camera;
  threeState.renderer = renderer;
  threeState.aircraft = jetGroup;
  threeState.pathLines = pathLines;
  threeState.waypoints = [];
  threeState.threats = {};
  threeState.tadpole = tadpole;
  threeState.shadow = shadow;
  threeState.grid = gridHelper;
  threeState.span = span;
}

function getAvailableAircraft(tr, frame) {
  const primaryName = tr.aircraft || 'Primary';
  const list = [{ name: primaryName, isPrimary: true }];
  if (frame && frame.threats) {
    for (const th of frame.threats) {
      if ((th.type === 'wingman' || th.type === 'lead' || th.type === 'aircraft') && th.name) {
        list.push({ name: th.name, isPrimary: false, entity: th });
      }
    }
  }
  return list;
}

function render3D(tr){
  if (!threeState.initialized || state.traceIdx < 0) {
    initThreeJS(tr);
  }

  const host = document.getElementById('threed-host');
  const dur = traceDuration(tr);
  const acFi = findFrameIndex(tr, Math.min(state.t, dur));
  const acFrame = tr.frames[acFi];
  if (!acFrame) return;

  const focusedName = state.focusedAircraftName || 'Primary';
  let targetAc = null;
  if (acFrame.threats) {
    targetAc = acFrame.threats.find(th => (th.type === 'wingman' || th.type === 'lead' || th.type === 'aircraft') && th.name === focusedName);
  }

  const cx = targetAc ? targetAc.y : acFrame.y;
  const cy = targetAc ? targetAc.x : acFrame.x;
  const cz = targetAc ? -targetAc.z : -acFrame.z;

  threeState.aircraft.position.set(cx, cy, cz);

  const theta = acFrame.theta || 0;
  const phi = acFrame.phi || 0;
  const psi = acFrame.psi || 0;
  const euler = new THREE.Euler(theta, phi, -psi, 'ZXY');
  threeState.aircraft.rotation.copy(euler);

  const positions = threeState.tadpole.geometry.attributes.position.array;
  positions[0] = cx; positions[1] = cy; positions[2] = cz;
  positions[3] = cx; positions[4] = cy; positions[5] = 0;
  threeState.tadpole.geometry.attributes.position.needsUpdate = true;
  threeState.tadpole.computeLineDistances();

  threeState.shadow.position.set(cx, cy, 0.05);

  let radius = threeState.span * 1.5 / state.zoom;
  radius = Math.max(80.0, radius);
  const cp = Math.max(0.01, Math.min(Math.PI / 2 - 0.01, state.orbit.pitch));

  const camX = cx + radius * Math.cos(cp) * Math.cos(state.orbit.yaw);
  const camY = cy + radius * Math.cos(cp) * Math.sin(state.orbit.yaw);
  const camZ = cz + radius * Math.sin(cp);

  threeState.camera.position.set(camX, camY, camZ);
  threeState.camera.lookAt(cx, cy, cz);

  for (const key in threeState.threats) {
    threeState.scene.remove(threeState.threats[key]);
  }
  threeState.threats = {};

  if (acFrame.threats) {
    const tStyle = {
      missile: { color: 0xf44336, r: 0.005 },
      lead: { color: 0xffd700, r: 0.006 },
      wingman: { color: 0x00e5ff, r: 0.005 },
      slot: { color: 0x2196f3, r: 0.005 },
      guns: { color: 0xff9800, r: 0.005 },
      target: { color: 0x9c27b0, r: 0.005 },
      airbase: { color: 0xffc107, r: 0.006 },
      aircraft: { color: 0x94a3b8, r: 0.005 }
    };
    for (let i = 0; i < acFrame.threats.length; i++) {
      const th = acFrame.threats[i];
      const st = tStyle[th.type] || tStyle.missile;
      const r = threeState.span * st.r;
      let mesh;

      if (th.type === 'lead' || th.type === 'wingman' || th.type === 'aircraft') {
        mesh = createAircraftMesh(32.8, st.color);
        const isTanker = th.name && th.name.toLowerCase().includes('tanker');
        if (isTanker) {
          mesh.scale.set(1.8, 1.8, 1.8);
        } else {
          mesh.scale.set(0.9, 0.9, 0.9);
        }
      } else {
        let geom;
        if (th.type === 'target') {
          geom = new THREE.BoxGeometry(r*2, r*2, r*2);
        } else if (th.type === 'airbase') {
          geom = new THREE.CylinderGeometry(r, r, r*2, 8);
          geom.rotateX(Math.PI / 2);
        } else if (th.type === 'missile') {
          geom = new THREE.CylinderGeometry(r*0.3, r*0.3, r*3, 8);
          geom.rotateX(Math.PI / 2);
        } else {
          geom = new THREE.ConeGeometry(r, r*2, 4);
          geom.rotateX(Math.PI / 2);
        }
        const mat = new THREE.MeshStandardMaterial({ color: st.color, roughness: 0.4 });
        mesh = new THREE.Mesh(geom, mat);
      }

      mesh.position.set(th.y, th.x, -th.z);

      if (th.type === 'target') {
        mesh.rotation.y = state.t * 2.0;
        mesh.rotation.x = state.t * 1.0;
      } else {
        const t_psi = th.psi || 0;
        const t_theta = th.theta || 0;
        const t_phi = th.phi || 0;
        const t_euler = new THREE.Euler(t_theta, t_phi, -t_psi, 'ZXY');
        mesh.rotation.copy(t_euler);
      }

      threeState.scene.add(mesh);
      threeState.threats['mesh_' + i] = mesh;

      const tz = -th.z;
      if (Math.abs(tz) > 1.0) {
        const tpPoints = [new THREE.Vector3(th.y, th.x, tz), new THREE.Vector3(th.y, th.x, 0)];
        const tpGeom = new THREE.BufferGeometry().setFromPoints(tpPoints);
        const tpMat = new THREE.LineDashedMaterial({ color: st.color, dashSize: threeState.span*0.01, gapSize: threeState.span*0.01, opacity: 0.4, transparent: true });
        const tpLine = new THREE.Line(tpGeom, tpMat);
        tpLine.computeLineDistances();
        threeState.scene.add(tpLine);
        threeState.threats['tp_' + i] = tpLine;

        const gGeom = new THREE.RingGeometry(r*0.8, r, 16);
        const gMat = new THREE.MeshBasicMaterial({ color: st.color, side: THREE.DoubleSide, opacity: 0.5, transparent: true });
        const gRing = new THREE.Mesh(gGeom, gMat);
        gRing.position.set(th.y, th.x, 0.05);
        threeState.scene.add(gRing);
        threeState.threats['gring_' + i] = gRing;
      }
    }
  }

  const width = host.clientWidth || 1000;
  threeState.camera.aspect = width / 620;
  threeState.camera.updateProjectionMatrix();
  threeState.renderer.setSize(width, 620);

  threeState.renderer.render(threeState.scene, threeState.camera);

  // --- Render HTML overlay labels ---
  const overlay = document.getElementById('labels-overlay');
  if (overlay) {
    overlay.innerHTML = '';
    const height = 620;
    const labelPoints = [];

    // 1. Receiver / Main aircraft
    const isRefueling = tr.scenario && tr.scenario.includes('aar');
    const rxName = isRefueling ? 'Receiver' : (tr.aircraft ? tr.aircraft.toUpperCase() : 'Aircraft');
    labelPoints.push({
      x: cx, y: cy, z: cz,
      name: rxName,
      color: '#00ffcc'
    });

    // 2. Other moving tracks (threats)
    if (acFrame.threats) {
      for (const th of acFrame.threats) {
        let thName = th.name;
        if (!thName) {
          if (th.type === 'missile') thName = 'AA01';
          else if (th.type === 'guns') thName = 'Guns';
          else if (th.type === 'target') thName = 'Target';
          else thName = th.type.toUpperCase();
        }
        let colorStr = '#f44336';
        if (th.type === 'lead') colorStr = '#ffd700';
        else if (th.type === 'wingman') colorStr = '#00e5ff';
        else if (th.type === 'aircraft') colorStr = '#94a3b8';
        else if (th.type === 'target') colorStr = '#9c27b0';
        else if (th.type === 'airbase') colorStr = '#ffc107';
        else if (th.type === 'slot') colorStr = '#2196f3';

        labelPoints.push({
          x: th.y, y: th.x, z: -th.z,
          name: thName,
          color: colorStr
        });
      }
    }

    // 3. Static waypoints
    if (tr.geometry) {
      for (const g of tr.geometry) {
        if (g.type === 'waypoint' && g.coords.length >= 3) {
          labelPoints.push({
            x: g.coords[1], y: g.coords[0], z: -g.coords[2],
            name: g.name || 'Waypoint',
            color: g.color || '#fff'
          });
        }
      }
    }

    // Project and render
    for (const pt of labelPoints) {
      const pos = new THREE.Vector3(pt.x, pt.y, pt.z);
      pos.project(threeState.camera);

      if (pos.z <= 1 && pos.x >= -1 && pos.x <= 1 && pos.y >= -1 && pos.y <= 1) {
        const screenX = (pos.x * 0.5 + 0.5) * width;
        const screenY = (-(pos.y * 0.5) + 0.5) * height;

        const labelDiv = document.createElement('div');
        labelDiv.style.position = 'absolute';
        labelDiv.style.left = screenX + 'px';
        labelDiv.style.top = (screenY - 15) + 'px';
        labelDiv.style.transform = 'translate(-50%, -100%)';
        labelDiv.style.background = 'rgba(15, 17, 23, 0.85)';
        labelDiv.style.border = '1px solid ' + pt.color;
        labelDiv.style.borderRadius = '4px';
        labelDiv.style.padding = '2px 6px';
        labelDiv.style.color = pt.color;
        labelDiv.style.fontSize = '10px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.whiteSpace = 'nowrap';
        labelDiv.style.boxShadow = '0 2px 4px rgba(0,0,0,0.5)';
        labelDiv.textContent = pt.name;
        overlay.appendChild(labelDiv);
      }
    }
  }
}

// ---------------------------------------------------------------------------
// Detail view assembly
// ---------------------------------------------------------------------------
function populateFocusSelect(tr) {
  const selectEl = document.getElementById('focus-select');
  if (!selectEl) return;
  selectEl.innerHTML = '';

  const names = new Set();
  const primaryName = tr.aircraft || 'Primary';
  names.add(primaryName);

  if (tr.frames) {
    for (const f of tr.frames) {
      if (f.threats) {
        for (const th of f.threats) {
          if (th.name) {
            names.add(th.name);
          }
        }
      }
    }
  }

  for (const name of names) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    if (name === state.focusedAircraftName) {
      opt.selected = true;
    }
    selectEl.appendChild(opt);
  }

  if (!names.has(state.focusedAircraftName)) {
    state.focusedAircraftName = primaryName;
    selectEl.value = primaryName;
  }
}

function showDetail(i){
  state.traceIdx=i;state.t=0;
  state.zoom=1.0;state.panX=0;state.panY=0;
  threeState.initialized = false;
  const tr=TRACES[i]; if(!tr)return;
  populateFocusSelect(tr);
  document.getElementById('index-view').classList.add('hidden');
  document.getElementById('detail-view').classList.remove('hidden');
  let titleText = tr.aircraft + ' / ' + tr.scenario;
  if (tr.testGroup) titleText = tr.testGroup + " — " + titleText;
  document.getElementById('detail-title').textContent = titleText;
  const st=traceStatus(tr);
  const badge=document.getElementById('detail-badge');
  badge.className='badge '+(st==='pass'?'pass':'fail');
  badge.textContent=st==='pass'?'PASS':'FAIL';
  let metaHtml = '';
  if (tr.testLevel) metaHtml += '<span>Level: <b>' + esc(tr.testLevel) + '</b></span>';
  document.getElementById('detail-summary').innerHTML=
    metaHtml +
    '<span>Duration: <b>'+fmt(traceDuration(tr),0)+'s</b></span>'+
    '<span>Frames: <b>'+tr.frames.length+'</b></span>'+
    '<span>Aircraft: <b>'+esc(tr.aircraft)+'</b></span>';
  document.getElementById('time-end').textContent=fmt(traceDuration(tr),1)+'s';
  renderPathView(tr);
  initCharts(tr);
  updateConditionalsPanel(tr);
  updatePlayhead();
}
function showIndex(){
  state.traceIdx=-1;
  stopPlay();
  document.getElementById('detail-view').classList.add('hidden');
  document.getElementById('index-view').classList.remove('hidden');
}

// ---------------------------------------------------------------------------
// Playback
// ---------------------------------------------------------------------------
function togglePlay(){
  if(state.playing)stopPlay();else startPlay();
}
function startPlay(){
  if(state.traceIdx<0)return;
  state.playing=true;
  const btn=document.getElementById('play-btn');
  btn.innerHTML='&#10073;&#10073; Pause';
  const dt=1/60;
  const tr=TRACES[state.traceIdx];
  if(tr){
    const maxT = traceDuration(tr);
    if(state.t>=maxT-0.01)state.t=0;
  }
  if(state.playTimer)clearInterval(state.playTimer);
  state.playTimer=setInterval(()=>{
    const tr=TRACES[state.traceIdx]; if(!tr)return;
    state.t+=dt*state.speed;
    const maxT = traceDuration(tr);
    if(state.t>=maxT){state.t=maxT;stopPlay();}
    updatePlayhead();
  },1000/60);
}
function stopPlay(){
  state.playing=false;
  const btn=document.getElementById('play-btn');
  if(btn)btn.innerHTML='&#9654; Play';
  if(state.playTimer){clearInterval(state.playTimer);state.playTimer=null;}
}

// ---------------------------------------------------------------------------
// Routing
// ---------------------------------------------------------------------------
function route(){
  const h=location.hash;
  if(h.indexOf('#trace/')===0){
    const idx=parseInt(h.slice(7),10);
    if(idx>=0&&idx<TRACES.length){showDetail(idx);return;}
  }
  showIndex();
}
window.addEventListener('hashchange',route);

// ---------------------------------------------------------------------------
// Wire up controls
// ---------------------------------------------------------------------------
document.getElementById('back-btn').addEventListener('click',()=>{location.hash='#';});
document.getElementById('play-btn').addEventListener('click',togglePlay);
document.getElementById('scrubber').addEventListener('input',e=>{
  if(state.traceIdx<0)return;
  const tr=TRACES[state.traceIdx];
  const maxT = traceDuration(tr);
  state.t=(+e.target.value/1000)*maxT;
  updatePlayhead();
});
document.querySelectorAll('#speed-seg button').forEach(b=>{
  b.addEventListener('click',()=>{
    state.speed=+b.dataset.speed;
    document.querySelectorAll('#speed-seg button').forEach(x=>x.classList.toggle('active',x===b));
  });
});
const selectEl = document.getElementById('focus-select');
if (selectEl) {
  selectEl.addEventListener('change', (e) => {
    state.focusedAircraftName = e.target.value;
    if(state.traceIdx>=0){
      renderPathView(TRACES[state.traceIdx]);
      updatePlayhead();
    }
  });
}
document.addEventListener('mousedown',e=>{
  if(state.traceIdx<0)return;
  const tdHost=document.getElementById('topdown-host');
  const td3Host=document.getElementById('threed-host');
  if(state.viewMode==='3d'){
    if(!td3Host.contains(e.target))return;
    state.orbit.dragging=true;
    state.orbit.lastX=e.clientX;
    state.orbit.lastY=e.clientY;
  }else{
    if(!tdHost.contains(e.target))return;
    state.orbit.dragging=true;
    state.orbit.lastX=e.clientX;
    state.orbit.lastY=e.clientY;
  }
});
document.addEventListener('mousemove',e=>{
  if(!state.orbit.dragging)return;
  const dx=e.clientX-state.orbit.lastX;
  const dy=e.clientY-state.orbit.lastY;
  if(state.viewMode==='3d'){
    state.orbit.yaw+=dx*0.01;
    state.orbit.pitch-=dy*0.01;
    state.orbit.pitch=Math.max(-0.35,Math.min(1.45,state.orbit.pitch));
    render3D(TRACES[state.traceIdx]);
  }else{
    state.panX+=dx;
    state.panY+=dy;
    renderTopDown(TRACES[state.traceIdx]);
  }
  state.orbit.lastX=e.clientX;
  state.orbit.lastY=e.clientY;
  updatePlayhead();
});
document.addEventListener('mouseup',()=>{state.orbit.dragging=false;});
document.addEventListener('wheel',e=>{
  if(state.traceIdx<0)return;
  const tdHost=document.getElementById('topdown-host');
  const td3Host=document.getElementById('threed-host');
  if(!tdHost.contains(e.target)&&!td3Host.contains(e.target))return;
  e.preventDefault();
  const factor=e.deltaY<0?1.15:1/1.15;
  state.zoom=Math.max(0.2,Math.min(2000,state.zoom*factor));
  renderPathView(TRACES[state.traceIdx]);
  updatePlayhead();
},{passive:false});
document.getElementById('filter-input').addEventListener('input',e=>{state.filter=e.target.value;renderIndex();});
document.getElementById('filter-status').addEventListener('change',e=>{state.filterStatus=e.target.value;renderIndex();});

// Tier tab click handler. Clicking a tab updates state.tierFilter and
// re-renders the index. The 'active' class is moved to the clicked tab.
document.querySelectorAll('.tier-tabs .tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tier-tabs .tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    state.tierFilter = tab.dataset.tier;
    renderIndex();
  });
});

document.addEventListener('keydown',e=>{
  if(state.traceIdx<0)return;
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  else if(e.code==='ArrowLeft'){
    state.t=Math.max(0,state.t-1);updatePlayhead();
  }else if(e.code==='ArrowRight'){
    const tr=TRACES[state.traceIdx];
    const maxT = traceDuration(tr);
    state.t=Math.min(maxT,state.t+1);updatePlayhead();
  }else if(e.code==='Escape'){location.hash='#';}
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
function init(){
  document.title = REPORT_TITLE;
  document.getElementById('app-title').textContent = REPORT_TITLE;
  const total=TRACES.length;
  let passN=0;
  for(const tr of TRACES)if(traceStatus(tr)==='pass')passN++;
  document.getElementById('app-sub').textContent=
    total+' traces &middot; '+passN+' fully passing &middot; click a card to inspect';
  renderIndex();
  route();
}
init();
</script>
